*{box-sizing:border-box;margin:0;padding:0}
.wrap{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;min-height:100vh;padding:24px 16px 48px;color:#1a202c;max-width:820px;margin:0 auto}

.pg-hdr h1{font-size:22px;font-weight:700;color:#1a202c;margin-bottom:5px}

.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);overflow:hidden;margin-bottom:16px}

.step-hdr{padding:20px 24px 16px;display:flex;align-items:flex-start;gap:16px;border-bottom:1px solid #f0f4f8}
.icon-c{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.phase-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.step-ttl{font-size:16px;font-weight:600;color:#1a202c;margin-bottom:8px}
.step-dsc{font-size:13px;color:#4a5568;line-height:1.8}
.vis-wrap{padding:16px 20px}
.nav-row{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-top:1px solid #f0f4f8}
.nbtn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e2e8f0;background:#fff;color:#4a5568;transition:background .15s}
.nbtn:hover{background:#f7f8fc}
.nbtn.pri{border:none;color:#fff}
.nbtn:disabled{opacity:.25;cursor:default;pointer-events:none}
.dots{display:flex;gap:5px;align-items:center}
.dt{width:7px;height:7px;border-radius:4px;background:#e2e8f0;cursor:pointer;transition:all .2s}
.dt.on{width:22px}
#wire-wrap{padding:0 8px 16px;cursor:default}
</style>

const ROW1 = [0,1,2,3,4];
const ROW2 = [5,6,7,8];
const NX1 = [68,204,340,476,612];
const NX2 = [70,206,342,478];
const NY1 = 55, NY2 = 155, R = 22;

let cur = 0;

function renderWire(){
  const c = STEPS[cur];
  let s = `<svg viewBox="0 0 680 200" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="wa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></marker>
  <marker id="wac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></marker></defs>`;

  // Row 1 arrows
  for(let i=0;i<4;i++){
    s+=`<line x1="${NX1[i]+R}" y1="${NY1}" x2="${NX1[i+1]-R}" y2="${NY1}" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#wa)"/>`;
  }
  // Row 2 arrows
  for(let i=0;i<3;i++){
    s+=`<line x1="${NX2[i]+R}" y1="${NY2}" x2="${NX2[i+1]-R}" y2="${NY2}" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#wa)"/>`;
  }
  // Corner connector
  s+=`<path d="M ${NX1[4]} ${NY1+R} L ${NX1[4]} 110 L ${NX2[0]} 110 L ${NX2[0]} ${NY2-R}" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#wac)"/>`;

  // Row 1 nodes
  ROW1.forEach((si,i)=>{
    const x=NX1[i], y=NY1;
    const active = si===cur;
    const done = si<cur;
    const fill = active ? STEPS[si].color : done ? STEPS[si].light : '#f1f5f9';
    const stroke = active ? STEPS[si].color : done ? STEPS[si].color+'88' : '#cbd5e1';
    const numcol = active ? '#fff' : done ? STEPS[si].color : '#94a3b8';
    s+=`<g style="cursor:pointer" onclick="jump(${si})">
      <circle cx="${x}" cy="${y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${active?2:1.5}"/>
      <text x="${x}" y="${y+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${numcol}" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${si+1}</text>
      <text x="${x}" y="${y+R+14}" text-anchor="middle" font-size="9" fill="${active?STEPS[si].color:done?STEPS[si].color:'#94a3b8'}" font-weight="${active?'700':'400'}" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${STEPS[si].wire}</text>
    </g>`;
  });

  // Row 2 nodes
  ROW2.forEach((si,i)=>{
    const x=NX2[i], y=NY2;
    const active = si===cur;
    const done = si<cur;
    const fill = active ? STEPS[si].color : done ? STEPS[si].light : '#f1f5f9';
    const stroke = active ? STEPS[si].color : done ? STEPS[si].color+'88' : '#cbd5e1';
    const numcol = active ? '#fff' : done ? STEPS[si].color : '#94a3b8';
    s+=`<g style="cursor:pointer" onclick="jump(${si})">
      <circle cx="${x}" cy="${y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${active?2:1.5}"/>
      <text x="${x}" y="${y+5}" text-anchor="middle" font-size="13" font-weight="700" fill="${numcol}" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${si+1}</text>
      <text x="${x}" y="${y+R+14}" text-anchor="middle" font-size="9" fill="${active?STEPS[si].color:done?STEPS[si].color:'#94a3b8'}" font-weight="${active?'700':'400'}" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${STEPS[si].wire}</text>
    </g>`;
  });

  s+=`</svg>`;
  document.getElementById('wire-wrap').innerHTML=s;
}

function renderStep(){
  const s=STEPS[cur];
  document.getElementById('step-hdr').innerHTML=`
    <div class="icon-c" style="background:${s.light}">${s.icon}</div>
    <div>
      <div class="phase-tag" style="color:${s.color}">${s.phase}</div>
      <div class="step-ttl">${s.title}</div>
      <div class="step-dsc">${s.desc}</div>
    </div>`;
  document.getElementById('vis-wrap').innerHTML=s.svg;
  const pb=document.getElementById('pb');
  const nb=document.getElementById('nb');
  pb.disabled=cur===0;
  nb.style.background=s.color;
  nb.disabled=cur===STEPS.length-1;
  const dr=document.getElementById('dotrow');
  dr.innerHTML=STEPS.map((st,i)=>`<div class="dt${i===cur?' on':''}" style="${i===cur?'background:'+st.color:i<cur?'background:'+st.color+'66':''}" onclick="jump(${i})"></div>`).join('');
}

function go(d){jump(cur+d);}
function jump(i){if(i<0||i>=STEPS.length)return;cur=i;renderWire();renderStep();}

renderWire();
renderStep();
</script>
